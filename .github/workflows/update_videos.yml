name: Auto-update YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger from GitHub web interface

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-videos.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html videos.json
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new videos to commit."
          else
            git commit -m "Auto-update YouTube videos portfolio [skip ci]"
            git push origin main
          fi
